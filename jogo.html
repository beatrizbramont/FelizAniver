<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Batalha Final do Mô ⚔️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="jogo.css">

</head>
<body>
    <div class="btn-voltar" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i>
    </div>
    <h1>⚔️ Batalha Final do Mô</h1>
    <p>Escolha o poder mais forte do jogo 😏</p>

    <div class="enemy">👑</div>

    <div class="hp-bar">
        <div class="hp" id="hp"></div>
    </div>
    <p class="msg" id="msg" style="margin-bottom: 20px; font-weight: bold; color: #ff4d4d;"></p>
    <div class="cards">

    <div class="card" onclick="errado('Não é forte o suficiente...')">
        <i class="fa-solid fa-fire"></i>
        <strong>Fúria</strong>
    </div>

    <div class="card" onclick="errado('Isso aí não derruba nem torre mo')">
        <i class="fa-solid fa-bolt"></i>
        <strong>Relâmpago</strong>
    </div>

    <div class="card" onclick="errado('Exército? sério mesmo?')">
        <i class="fa-solid fa-skull"></i>
        <strong>Exército</strong>
    </div>

    <div class="card" onclick="errado('Rei não entra na arena assim não...')">
        <i class="fa-solid fa-chess-king"></i>
        <strong>Rei</strong>
    </div>

    <div class="card" onclick="errado('Sério mo??')">
        <i class="fa-solid fa-snowflake"></i>
        <strong>Gelo</strong>
    </div>

    <div class="card" onclick="errado('Quase... mas ainda não')">
        <i class="fa-solid fa-hat-wizard"></i>
        <strong>Bruxa</strong>
    </div>

    <div class="card" onclick="certo()">
        <i class="fa-solid fa-skull"></i>
        <strong>PEKKA</strong>
    </div>

    </div>

<script src="script.js"></script>

</body>
</html>
